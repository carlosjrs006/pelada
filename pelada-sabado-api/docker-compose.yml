version: '3.8'

services:

  # ── Banco de dados PostgreSQL ──────────────────────────
  db:
    image: postgres:15-alpine
    container_name: pelada-db
    environment:
      POSTGRES_DB: pelada_sabado
      POSTGRES_USER: pelada
      POSTGRES_PASSWORD: pelada123
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pelada -d pelada_sabado"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── API Spring Boot ────────────────────────────────────
  api:
    build: .
    container_name: pelada-api
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

volumes:
  postgres_data:
