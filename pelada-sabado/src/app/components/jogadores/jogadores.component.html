<div class="page-content fade-in">

  <!-- Header da página -->
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h5 class="text-white mb-0 fw-bold"><i class="bi bi-person-badge-fill text-warning me-2"></i>Jogadores</h5>
    <button class="btn btn-sm btn-warning fw-bold" (click)="showForm = !showForm; modoEdicao = null">
      <i class="bi bi-plus-lg"></i> Novo
    </button>
  </div>

  <!-- Formulário Novo/Editar Jogador -->
  <div class="card mb-4" *ngIf="showForm">
    <div class="card-body p-3">
      <h6 class="text-warning mb-3">{{ modoEdicao ? 'Editar Jogador' : 'Novo Jogador' }}</h6>

      <div class="mb-3">
        <label class="form-label text-white-50" style="font-size:0.8rem;">Nome *</label>
        <input type="text" class="form-control" [(ngModel)]="novoJogador.nome" placeholder="Nome do jogador">
      </div>

      <div class="mb-3">
        <label class="form-label text-white-50" style="font-size:0.8rem;">Tipo</label>
        <select class="form-select" [(ngModel)]="novoJogador.tipo">
          <option value="mensalista">Mensalista</option>
          <option value="convidado">Convidado</option>
          <option value="goleiro">Goleiro</option>
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label text-white-50" style="font-size:0.8rem;">Nível (Estrelas)</label>
        <div class="star-rating d-flex gap-2" style="font-size:1.6rem; cursor:pointer;">
          <i *ngFor="let s of [1,2,3,4,5]"
             [class]="s <= novoJogador.estrelas ? 'bi bi-star-fill' : 'bi bi-star'"
             (click)="novoJogador.estrelas = s"></i>
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label text-white-50" style="font-size:0.8rem;">Número (opcional)</label>
        <input type="number" class="form-control" [(ngModel)]="novoJogador.numero" placeholder="Ex: 7">
      </div>

      <div class="d-flex gap-2">
        <button class="btn btn-warning flex-grow-1 fw-bold" (click)="salvar()">
          <i class="bi bi-check-lg me-1"></i>{{ modoEdicao ? 'Salvar' : 'Adicionar' }}
        </button>
        <button class="btn btn-outline-secondary" (click)="cancelar()">Cancelar</button>
      </div>
    </div>
  </div>

  <!-- Filtros -->
  <div class="mb-3">
    <input type="text" class="form-control mb-2" placeholder="🔍 Buscar jogador..." [(ngModel)]="filtroBusca">
    <div class="d-flex gap-2 overflow-auto pb-1" style="white-space:nowrap;">
      <button class="btn btn-sm" [class.btn-warning]="filtroTipo==='todos'" [class.btn-outline-secondary]="filtroTipo!=='todos'"
              (click)="filtroTipo='todos'">Todos</button>
      <button class="btn btn-sm" [class.btn-success]="filtroTipo==='mensalista'" [class.btn-outline-secondary]="filtroTipo!=='mensalista'"
              (click)="filtroTipo='mensalista'">Mensalistas</button>
      <button class="btn btn-sm" [class.btn-info]="filtroTipo==='convidado'" [class.btn-outline-secondary]="filtroTipo!=='convidado'"
              (click)="filtroTipo='convidado'">Convidados</button>
      <button class="btn btn-sm" [class.btn-warning]="filtroTipo==='goleiro'" [class.btn-outline-secondary]="filtroTipo!=='goleiro'"
              (click)="filtroTipo='goleiro'">Goleiros</button>
    </div>
  </div>

  <!-- Lista de jogadores -->
  <div class="text-white-50 text-center py-4" *ngIf="jogadoresFiltrados.length === 0">
    <i class="bi bi-person-x" style="font-size:2.5rem;"></i>
    <p class="mt-2">Nenhum jogador encontrado</p>
  </div>

  <div class="player-card d-flex align-items-center gap-3"
       *ngFor="let j of jogadoresFiltrados">

    <div class="player-avatar" [style.background]="'#' + (j.estrelas >= 5 ? 'f8b400' : j.estrelas >= 4 ? '1a6b2a' : '2d3a2e')">
      {{ getIniciais(j.nome) }}
    </div>

    <div class="flex-grow-1 min-width-0">
      <div class="d-flex align-items-center gap-2">
        <span class="text-white fw-semibold" style="font-size:0.95rem;">{{ j.nome }}</span>
        <span *ngIf="j.numero" class="badge bg-secondary" style="font-size:0.65rem;">#{{ j.numero }}</span>
      </div>
      <div class="d-flex align-items-center gap-2 mt-1">
        <span class="badge" [class]="'badge-' + getCorTipo(j.tipo)" style="font-size:0.65rem;">{{ j.tipo }}</span>
        <span class="star-rating" style="font-size:0.8rem;">
          <i *ngFor="let s of [1,2,3,4,5]"
             [class]="s <= j.estrelas ? 'bi bi-star-fill' : 'bi bi-star'"></i>
        </span>
      </div>
      <div class="d-flex align-items-center gap-3 mt-1">
        <span style="font-size:0.75rem; color:#aaa;">⚽ <strong class="text-warning">{{ getTotalGols(j.id) }}</strong></span>
        <span style="font-size:0.75rem; color:#aaa;">🎯 <strong class="text-info">{{ getTotalAssistencias(j.id) }}</strong></span>
      </div>
    </div>

    <div class="d-flex flex-column gap-1">
      <button class="btn btn-sm btn-outline-warning p-1" style="line-height:1;" (click)="editar(j)">
        <i class="bi bi-pencil-fill"></i>
      </button>
      <button class="btn btn-sm btn-outline-danger p-1" style="line-height:1;" (click)="excluir(j.id)">
        <i class="bi bi-trash-fill"></i>
      </button>
    </div>
  </div>

  <div class="text-white-50 text-center mt-3" style="font-size:0.8rem;">
    <i class="bi bi-people me-1"></i>{{ jogadoresFiltrados.length }} jogadores
  </div>

</div>
