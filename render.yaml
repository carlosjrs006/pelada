databases:
  - name: pelada-db
    databaseName: pelada_sabado
    user: pelada
    plan: free

services:
  # ── Backend Spring Boot ────────────────────────────────────
  - type: web
    name: pelada-sabado-api
    runtime: docker
    rootDir: pelada-sabado-api
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DATABASE_URL
        fromDatabase:
          name: pelada-db
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        value: https://pelada-sabado.onrender.com

  # ── Frontend Angular ────────────────────────────────────────
  - type: web
    name: pelada-sabado
    runtime: docker
    rootDir: pelada-sabado
    dockerfilePath: ./Dockerfile
    plan: free
