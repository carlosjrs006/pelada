databases:
  - name: pelada-db
    databaseName: pelada_sabado
    user: pelada
    plan: free

services:
  # ── Backend Spring Boot ────────────────────────────────────
  - type: web
    name: pelada-sabado-api
    runtime: docker
    rootDir: pelada-sabado-api
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DB_HOST
        fromDatabase:
          name: pelada-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: pelada-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: pelada-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: pelada-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: pelada-db
          property: password
      - key: CORS_ALLOWED_ORIGINS
        value: https://pelada-sabado.onrender.com

  # ── Frontend Angular ────────────────────────────────────────
  - type: web
    name: pelada-sabado
    runtime: docker
    rootDir: pelada-sabado
    dockerfilePath: ./Dockerfile
    plan: free
